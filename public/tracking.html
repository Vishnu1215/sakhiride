<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sakhi Ride — Live Tracking</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f5f5f5; }
    .header {
      background: #8B1A8B; color: white;
      padding: 14px 20px; display: flex; align-items: center; gap: 12px;
    }
    .header h2 { font-size: 18px; }
    .status-badge {
      background: #4CAF50; color: white;
      padding: 4px 12px; border-radius: 20px;
      font-size: 13px; margin-left: auto;
    }
    #map { width: 100%; height: calc(100vh - 130px); }
    .info-bar {
      background: white; padding: 12px 20px;
      display: flex; gap: 24px;
      border-top: 1px solid #eee; font-size: 14px; color: #333;
    }
    .info-bar span { color: #8B1A8B; font-weight: bold; }
    .back-btn {
      background: white; color: #8B1A8B;
      border: 2px solid white; padding: 6px 16px;
      border-radius: 6px; cursor: pointer; font-weight: bold;
    }
  </style>
</head>
<body>
  <div class="header">
    <h2>🚗 Live Ride Tracking</h2>
    <button class="back-btn" onclick="window.location.href='/'">← Back</button>
    <div class="status-badge" id="status-text">Connecting...</div>
  </div>
  <div id="map"></div>
  <div class="info-bar">
    <div>Driver: <span id="driver-name">Loading...</span></div>
    <div>Last updated: <span id="last-update">—</span></div>
    <div>Location: <span id="coord-display">—</span></div>
  </div>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const HYDERABAD_CENTER = [17.3850, 78.4867];
    const map = L.map('map').setView(HYDERABAD_CENTER, 13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenStreetMap contributors', maxZoom: 19
    }).addTo(map);

    const driverIcon = L.divIcon({
      html: `<div style="background:#8B1A8B;width:36px;height:36px;border-radius:50% 50% 50% 0;transform:rotate(-45deg);border:3px solid white;box-shadow:0 2px 8px rgba(0,0,0,0.4);"></div>`,
      iconSize: [36, 36], iconAnchor: [18, 36], className: ''
    });

    const landmarks = [
      { name: 'Charminar', lat: 17.3616, lng: 78.4747 },
      { name: 'Hitech City', lat: 17.4435, lng: 78.3772 },
      { name: 'Secunderabad', lat: 17.4399, lng: 78.4983 },
      { name: 'Banjara Hills', lat: 17.4126, lng: 78.4480 },
      { name: 'Gachibowli', lat: 17.4401, lng: 78.3489 },
      { name: 'CBIT', lat: 17.3860, lng: 78.3712 }
    ];
    landmarks.forEach(lm => {
      L.circleMarker([lm.lat, lm.lng], {
        radius: 5, fillColor: '#aaa', color: '#888', weight: 1, fillOpacity: 0.6
      }).addTo(map).bindTooltip(lm.name);
    });

    const params = new URLSearchParams(window.location.search);
    const rideId = params.get('ride_id');
    const userRole = params.get('role');
    let driverMarker = null, routeLine = null, trackingPath = [];

    function startSharingLocation() {
      document.getElementById('status-text').textContent = 'Sharing your location';
      const token = localStorage.getItem('sakhi_token');
      setInterval(() => {
        navigator.geolocation.getCurrentPosition(pos => {
          fetch('/api/tracking/update', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
            body: JSON.stringify({ ride_id: rideId, lat: pos.coords.latitude, lng: pos.coords.longitude })
          });
        });
      }, 5000);
    }

    function pollDriverLocation() {
      const token = localStorage.getItem('sakhi_token');
      setInterval(async () => {
        try {
          const res = await fetch(`/api/tracking/location/${rideId}`, {
            headers: { 'Authorization': 'Bearer ' + token }
          });
          const data = await res.json();
          if (data.lat && data.lng) {
            const pos = [data.lat, data.lng];
            if (!driverMarker) {
              driverMarker = L.marker(pos, { icon: driverIcon }).addTo(map)
                .bindPopup(`<b>${data.driver_name || 'Your Driver'}</b>`).openPopup();
              map.setView(pos, 15);
            } else { driverMarker.setLatLng(pos); }
            trackingPath.push(pos);
            if (routeLine) map.removeLayer(routeLine);
            if (trackingPath.length > 1) {
              routeLine = L.polyline(trackingPath, { color: '#8B1A8B', weight: 3, dashArray: '6,4' }).addTo(map);
            }
            document.getElementById('last-update').textContent = new Date().toLocaleTimeString();
            document.getElementById('coord-display').textContent = `${data.lat.toFixed(4)}, ${data.lng.toFixed(4)}`;
            document.getElementById('status-text').textContent = 'Ride in Progress';
            document.getElementById('driver-name').textContent = data.driver_name || 'Driver';
          }
        } catch (err) {}
      }, 5000);
    }

    if (userRole === 'rider') startSharingLocation();
    else pollDriverLocation();
  </script>
</body>
</html>
